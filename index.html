<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmy's Diner</title>

    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1 class="heading">Jimmy's Diner</h1>
    <p class="tagline">The best burgers and pizzas in town.</p>
</header>

<main class="menu-container"></main>

<section class="order-container">
    <h2 class="order-title">Your Order</h2>

    <ul class="order-list"></ul>

    <div class="total-container"></div>
</section>

<section class="modal-container">
    <h2 class="modal-title">Enter card details</h2>

    <form class="modal-form">
        <input
                type="text"
                class="full-name"
                placeholder="Enter your name"
                required
        >

        <input
                type="text"
                class="card-number"
                placeholder="Enter card number"
                required
        >

        <input
                type="text"
                class="card-cvv"
                placeholder="Enter CVV"
                required
        >

        <button type="submit" class="pay-button">
            Pay
        </button>
    </form>
</section>

<section class="success-message-container">
    <h2 class="success-message"></h2>
</section>

<script type="module" src="index.js"></script>

</body>
</html>
